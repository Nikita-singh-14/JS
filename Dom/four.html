<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: #212121; color: aliceblue;">
    <ul class="langauge">
        <li>Java</li>
    </ul>
</body>
<script>
    //this is not optimize beacuse when we want to add li then it travers the whole tree and add li in last.
    function addLangauge(langaugeName) {
        const li = document.createElement("li");
        li.innerText = `${langaugeName}`;
        const ul = document.querySelector('ul');
        ul.appendChild(li);
    }
    addLangauge("Python")
    addLangauge("JavaScript")

    //optimized version
    function addOptLangauge(langaugeName){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langaugeName));
        document.querySelector('.langauge').appendChild(li);
    }
    addOptLangauge("goLang");

    //Edit
    const secondChild = document.querySelector('li:nth-child(2)');
    //secondChild.innerHTML = "HTML"
    secondChild.outerHTML = "<li>CSS</li>"

    const firstChild = document.querySelector('li:first-child')
    firstChild.textContent = "C++"

    const newli = document.createElement('li')
    newli.innerText = "Mojo";
    firstChild.replaceWith(newli)

    //remove

    // console.log(secondChild)
    // secondChild.remove();
    newli.remove()

</script>
</html>
